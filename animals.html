<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC Quiz</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0b1f3a;
            color: white;
        }

        .container {
            width: 500px;
            margin: 30px auto;
            text-align: center;
        }

        .hide {
            display: none;
        }

        #question {
            font-size: 22px;
            margin-bottom: 20px;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option {
            background: white;
            color: black;
            padding: 12px;
            border-radius: 8px;
            text-align: left;
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 18px;
            cursor: pointer;
        }

        #timer {
            color: yellow;
            font-size: 22px;
            margin-bottom: 20px;
        }
    </style>

</head>

<body>

    <div class="container">

        <div id="divStart">
            <button onclick="startGame()">Start</button>
        </div>

        <div id="divGame" class="hide">

            <h2>KBC Quiz</h2>

            <div id="timer">Time : 10</div>

            <h3 id="question"></h3>

            <div class="options">

                <div class="option">
                    <input type="radio" name="q" id="a">
                    <label for="a" id="la"></label>
                </div>

                <div class="option">
                    <input type="radio" name="q" id="b">
                    <label for="b" id="lb"></label>
                </div>

                <div class="option">
                    <input type="radio" name="q" id="c">
                    <label for="c" id="lc"></label>
                </div>

                <div class="option">
                    <input type="radio" name="q" id="d">
                    <label for="d" id="ld"></label>
                </div>

            </div>

            <button onclick="submitAnswer()">Submit</button>

        </div>

    </div>

    <script>

        const questions = [
            {
                question: "1. HTML stands for?",
                options: [
                    "Hyper Text Markup Language",
                    "High Text Machine Language",
                    "Hyper Transfer Markup Language",
                    "Home Tool Markup Language"
                ],
                answer: 0
            },
            {
                question: "2. CSS is used for?",
                options: [
                    "Programming",
                    "Styling Web Page",
                    "Database",
                    "Operating System"
                ],
                answer: 1
            },
            {
                question: "3. JavaScript is a?",
                options: [
                    "Markup Language",
                    "Programming Language",
                    "Database",
                    "Operating System"
                ],
                answer: 1
            },
            {
                question: "4. Which tag is used for Image?",
                options: [
                    "<img>",
                    "<image>",
                    "<pic>",
                    "<src>"
                ],
                answer: 0
            },
            {
                question: "5. Which tag is used for Link?",
                options: [
                    "<link>",
                    "<a>",
                    "<href>",
                    "<url>"
                ],
                answer: 1
            }
        ];

        let current = 0;
        let score = 0;
        let time = 10;
        let timer;

        function startGame() {
            document.getElementById("divStart").classList.add("hide");
            document.getElementById("divGame").classList.remove("hide");
            loadQuestion();
        }

        function loadQuestion() {

            clearInterval(timer);

            document.querySelectorAll("input[name=q]").forEach(r => r.checked = false);

            let q = questions[current];

            document.getElementById("question").innerHTML = q.question;
            document.getElementById("la").innerHTML = q.options[0];
            document.getElementById("lb").innerHTML = q.options[1];
            document.getElementById("lc").innerHTML = q.options[2];
            document.getElementById("ld").innerHTML = q.options[3];

            time = 10;
            document.getElementById("timer").innerHTML = "Time : " + time;

            timer = setInterval(function () {

                time--;

                document.getElementById("timer").innerHTML = "Time : " + time;

                if (time == 0) {
                    clearInterval(timer);
                    nextQuestion();
                }

            }, 1000);

        }

        function submitAnswer() {

            clearInterval(timer);

            let selected = -1;

            if (document.getElementById("a").checked) selected = 0;
            if (document.getElementById("b").checked) selected = 1;
            if (document.getElementById("c").checked) selected = 2;
            if (document.getElementById("d").checked) selected = 3;

            if (selected == questions[current].answer) {
                score++;
            }

            nextQuestion();

        }

        function nextQuestion() {

            current++;

            if (current < questions.length) {
                loadQuestion();
            }
            else {
                document.getElementById("divGame").innerHTML =
                    "<h1>timeout</h1>" +
                    "<h2>Your Score : " + score + " / " + questions.length + "</h2>";
            }

        }

    </script>

</body>

</html>
