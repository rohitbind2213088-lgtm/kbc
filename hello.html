<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC Quiz</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #07123d;
            color: white;
        }

        .start-screen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .start-box {
            width: 700px;
            background: #6e063d;
            border: 3px solid gold;
            border-radius: 30px;
            text-align: center;
            padding: 50px;
        }

        .start-box h1 {
            color: gold;
            font-size: 55px;
            margin-bottom: 40px;
        }

        .start-box button {
            padding: 15px 40px;
            font-size: 22px;
            border: none;
            border-radius: 30px;
            background: gold;
            cursor: pointer;
            font-weight: bold;
        }

        .start-box button:hover {
            background: orange;
        }

        .hide {
            display: none;
        }

        /* Header */

        .logo {
            text-align: center;
            margin-top: 15px;
        }

        .logo img {
            width: 280px;
        }

        .header {
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            background: #214e8a;
            padding: 12px;
        }

        .lifelines {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px;
        }

        .lifelines button {
            padding: 10px 20px;
            background: gold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }



        .question-box {
            width: 70%;
            margin: 25px auto;
            background: #1b2373;
            border-radius: 15px;
            padding: 25px;
        }

        #question {
            text-align: center;
            margin-bottom: 25px;
        }

        .options {
            display: grid;
            gap: 15px;
        }

        .option {
            background: #303da0;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
        }

        .option:hover {
            background: gold;
            color: black;
        }


        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option {
            background: #303da0;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
        }



        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .submit-btn,
        .next-btn {
            padding: 12px 35px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        .submit-btn {
            background: limegreen;
        }

        .next-btn {
            background: orange;
            display: none;
        }



        .prizes {
            position: fixed;
            right: 20px;
            top: -50px;
            width: 180px;
            background: #10164b;
            border-radius: 10px;
            padding: 15px;
        }

        .prizes h3 {
            text-align: center;
            margin-bottom: 10px;
        }

        .prizes ul {
            list-style: none;
        }

        .prizes li {
            padding: 8px;
            border-bottom: 1px solid gray;
        }



        #score {
            text-align: center;
            margin-top: 15px;
            color: gold;
            font-size: 20px;
        }

        .correct {
            background: green !important;
            color: white !important;
        }

        .wrong {
            background: red !important;
            color: white !important;
        }

        .prizes li.active {
            background: gold;
            color: black;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <!-- Start Screen -->

    <div id="startScreen" class="start-screen">

        <div class="start-box">

            <h1>KBC Quiz</h1>

            <button onclick="startGame()">
                Start Game
            </button>

        </div>

    </div>

    <div id="gameScreen" class="hide">

        <div class="logo">
            <img src="kbc.jpg" alt="">
        </div>

        <div class="header">
            Kaun Banega Crorepati
        </div>

        <div class="lifelines">
            <button>50 : 50</button>
            <button>Audience Poll</button>
            <button>Phone a Friend</button>
            <button>Walk Away</button>
        </div>

        <div class="question-box">

            <h2 id="question"></h2>

            <div class="options">

                <label class="option">
                    <input type="radio" name="option" value="0">
                    <span id="op0"></span>
                </label>

                <label class="option">
                    <input type="radio" name="option" value="1">
                    <span id="op1"></span>
                </label>

                <label class="option">
                    <input type="radio" name="option" value="2">
                    <span id="op2"></span>
                </label>

                <label class="option">
                    <input type="radio" name="option" value="3">
                    <span id="op3"></span>
                </label>

            </div>

            <div class="buttons">

                <button class="submit-btn" onclick="checkAnswer()">
                    Check Answer
                </button>

                <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
                    Next Question
                </button>

            </div>

            <h2 id="score">
                Score : 0
            </h2>

        </div>

        <div class="prizes">

            <h3>Prize Money</h3>

            <ul id="prizeList">
                <li>₹1,000</li>
                <li>₹2,000</li>
                <li>₹3,000</li>
                <li>₹5,000</li>
                <li>₹10,000</li>
                <li>₹20,000</li>
                <li>₹40,000</li>
                <li>₹80,000</li>
                <li>₹1,60,000</li>
                <li>₹3,20,000</li>
                <li>₹6,40,000</li>
                <li>₹12,50,000</li>
                <li>₹25,00,000</li>
                <li>₹50,00,000</li>
                <li>₹1 Crore</li>
                <li>₹2 Crore</li>
                <li>₹3 Crore</li>

            </ul>

        </div>

        <script>


            const questions = [
                {
                    question: "1. In the film 'Mr India', Mogambo was looking for a formula to enable what?",
                    options: [
                        "A. Immortality",
                        "B. Inanimation",
                        "C. Invisibility",
                        "D. Intelligence"
                    ],
                    answer: 2
                },
                {
                    question: "2. Which is the National Animal of India?",
                    options: [
                        "A. Lion",
                        "B. Tiger",
                        "C. Elephant",
                        "D. Leopard"
                    ],
                    answer: 1
                },
                {
                    question: "3. Which planet is known as the Red Planet?",
                    options: [
                        "A. Earth",
                        "B. Mars",
                        "C. Jupiter",
                        "D. Venus"
                    ],
                    answer: 1
                },
                {
                    question: "4. HTML stands for?",
                    options: [
                        "A. Hyper Text Markup Language",
                        "B. High Text Machine Language",
                        "C. Hyper Tool Markup Language",
                        "D. Hyper Transfer Markup Language"
                    ],
                    answer: 0
                },
                {
                    question: "5. CSS stands for?",
                    options: [
                        "A. Computer Style Sheets",
                        "B. Cascading Style Sheets",
                        "C. Creative Style Sheets",
                        "D. Colorful Style Sheets"
                    ],
                    answer: 1
                },
                {
                    "question": "6. What is the capital of Uttar Pradesh?",

                    options: [
                        "a. Lucknow",
                        "b. Kanpur",
                        "c.  Varanasi",
                        "d. Agra",

                    ],
                    answer: 0
                },
                {
                    "question": "7. What is the capital of Bihar?",
                    options: [
                        "a. Gaya",
                        "b. Patna",
                        "c. Bhagalpur",
                        "d. Muzaffarpur",

                    ],
                    answer: 1

                },
                {
                    "question": "8. What is the capital of Rajasthan?",
                    options: [
                        "a. Jodhpur",
                        "b. Udaipur",
                        "c. Jaipur",
                        "d. Ajmer",
                    ],

                    answer: 2

                },
                {
                    "question": "9. What is the capital of Madhya Pradesh?",
                    options: [
                        "a. Indore",
                        "b. Gwalior",
                        "c. Jabalpur",
                        "d. Bhopal"
                    ],

                    answer: 3
                },

                {
                    "question": "10. What is the capital of Maharashtra?",
                    options: [
                        "a. Mumbai",
                        "b. Pune",
                        "c. Nagpur",
                        "d. Nashik"
                    ],
                    answer: 0
                },

                {
                    "question": "11. What is the capital of Gujarat?",
                    options: [
                        "a. Ahmedabad",
                        "b. Gandhinagar",
                        "c. Surat",
                        "d. Vadodara"
                    ],
                    answer: 1
                },
                {
                    "question": "12. What is the capital of West Bengal?",
                    options: [
                        "a. Siliguri",
                        "b. Howrah",
                        "c. Kolkata",
                        "d. Durgapur"
                    ],
                    answer: 2
                },
                {
                    "question": "13. What is the capital of Tamil Nadu?",
                    options: [
                        "a. Madurai",
                        "b. Coimbatore",
                        "c. Tiruchirappalli",
                        "d. Chennai"
                    ],
                    answer: 3
                },
                {
                    "question": "14. What is the capital of Karnataka?",
                    options: [
                        "a. Bengaluru",
                        "b. Mysuru",
                        "c. Mangaluru",
                        "d. Hubballi"
                    ],
                    answer: 0
                },
                {
                    "question": "15. What is the capital of Kerala?",
                    options: [
                        "a. Kochi",
                        "b. Thiruvananthapuram",
                        "c. Kozhikode",
                        "d. Thrissur"
                    ],
                    answer: 1
                },
                {
                    "question": "16. What is the capital of Punjab?",
                    "options": [
                        "a. Ludhiana",
                        "b. Amritsar",
                        "c. Chandigarh",
                        "d. Jalandhar"
                    ],
                    answer: 2
                },
                {
                    "question": "17. What is the capital of Haryana?",
                    "options": [
                        "a. Gurugram",
                        "b. Faridabad",
                        "c. Panipat",
                        "d. Chandigarh"
                    ],
                    answer: 3
                },


            ];

            let currentQuestion = 0;
            let score = 0;
            const prizeAmount = ["₹1,000", "₹2,000", "₹3,000", "₹5,000", "₹10,000", "₹20,000", "₹40,000", "₹80,000", "₹1,60,000", "₹3,20,000", "₹6,40,000", "₹12,50,000", "₹25,00,000", "₹50,00,000", "₹1 Crore", "₹2 Crore", "₹3 Crore", "₹4 Crore", "₹5 Crore", "₹7 Crore"];
            function updatePrizeMoney() {
                let prizes = document.querySelectorAll("#prizeList li");
                prizes.forEach(li => li.classList.remove("active"));
                if (score > 0 && score <= prizes.length) prizes[score - 1].classList.add("active");
            }

            function startGame() {
                document.getElementById("startScreen").classList.add("hide");
                document.getElementById("gameScreen").classList.remove("hide");
                loadQuestion();
            }

            function loadQuestion() {

                document.getElementById("question").innerHTML =
                    questions[currentQuestion].question;

                document.getElementById("op0").innerHTML =
                    questions[currentQuestion].options[0];

                document.getElementById("op1").innerHTML =
                    questions[currentQuestion].options[1];

                document.getElementById("op2").innerHTML =
                    questions[currentQuestion].options[2];

                document.getElementById("op3").innerHTML =
                    questions[currentQuestion].options[3];

                document.querySelectorAll("input[name='option']").forEach(function (r) {
                    r.checked = false;
                });

                document.querySelectorAll(".option").forEach(o => o.classList.remove("correct", "wrong"));
                document.getElementById("nextBtn").style.display = "none";
            }

            function checkAnswer() {

                let selected = document.querySelector("input[name='option']:checked");
                if (!selected) { alert("Please select an answer."); return; }

                let answer = Number(selected.value);
                let options = document.querySelectorAll(".option");
                options.forEach(o => o.classList.remove("correct", "wrong"));

                if (answer === questions[currentQuestion].answer) {
                    options[answer].classList.add("correct");
                    score++;
                    updatePrizeMoney();
                } else {
                    options[answer].classList.add("wrong");
                    options[questions[currentQuestion].answer].classList.add("correct");
                }

                document.getElementById("score").innerHTML = "Score : " + score;
                document.getElementById("nextBtn").style.display = "inline-block";
            }

            function nextQuestion() {

                currentQuestion++;

                if (currentQuestion < questions.length) {

                    loadQuestion();

                }
                else {

                    alert("🎉 Quiz Finished!\n\nYour Score : " + score + " / " + questions.length + "\n\nYou Won : " + (score > 0 ? prizeAmount[score - 1] : "₹0"));

                    location.reload();

                }

            }
        </script>


    </div>

</body>

</html>
