<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizbuttom</title>

    <style>
                 body{

                    background-color: aqua;
                 }


        .question {
            display: none;
            width: 500px;
            margin: auto;
        }

        .question:first-child {
            display: block;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 500px;
            margin: auto;
            gap: 10px;
        }
    </style>

</head>

<body>

    <div class="question">
        <h2 id="txtQuestion"></h2>

        <div class="options">
            <label id="txtA" for="rdA"></label> <input id="rdA" type="radio" name="q1">
            <label id="txtB" for="rdB"></label><input id="rdB" type="radio" name="q1">
            <label id="txtC" for="rdC"></label><input id="rdC" type="radio" name="q1">
            <label id="txtD" for="rdD"></label><input id="rdD" type="radio" name="q1">
        </div>

        <br>
        <div style="text-align:center;">
            <button onclick="nextQuestion()">Submit</button>
        </div>
    </div>
    <div style="text-align: center;">
        <button onclick="nextQuestion()">Start</button>
    </div>



    <script>
        let questionno = 0;
        let timer;
        let timeLeft = 3;

        const questions = [
            {
                question: "What is the capital of Uttar Pradesh",
                a: "Varanasi",
                b: "Lucknow",
                c: "Agra",
                d: "Kanpur",
                answer: 2
            },
            {
                question: "What is the HTML",
                a: "css",
                b: "java",
                c: "javascript",
                d: "HyperText Markup Language",
                answer: 4
            },
            {
                question: "What is the css",
                a: "html",
                b: "python",
                c: "Agra",
                d: "Cascading Style Sheets",
                answer: 4
            },
            {
                question: "What is the capital of india",
                a: "Varanasi",
                b: "New Delhi",
                c: "Agra",
                d: "Kanpur",
                answer: 2
            },
            {
                question: "What is the capital of japan",
                a: "Varanasi",
                b: "Lucknow",
                c: "Tokyo",
                d: "Kanpur",
                answer: 3
            }
        ];

        const txtQuestion = document.getElementById("txtQuestion");
        const txtA = document.getElementById("txtA");
        const txtB = document.getElementById("txtB");
        const txtC = document.getElementById("txtC");
        const txtD = document.getElementById("txtD");

        function nextQuestion() {

            clearInterval(timer);

            if (questionno >= questions.length) {
                txtQuestion.innerHTML = "Quiz Finished";
                return;
            }

            txtQuestion.innerHTML = (questionno + 1) + ") " + questions[questionno].question;
            txtA.innerHTML = questions[questionno].a;
            txtB.innerHTML = questions[questionno].b;
            txtC.innerHTML = questions[questionno].c;
            txtD.innerHTML = questions[questionno].d;

            rdA.checked = false;
            rdB.checked = false;
            rdC.checked = false;
            rdD.checked = false;

            timeLeft = 3;

            timer = setInterval(function () {

                timeLeft--;

                console.log(timeLeft);

                if (timeLeft == 0) {
                    clearInterval(timer);
                    questionno++;
                    nextQuestion();
                }

            }, 1000);

        }

        function submitAnswer() {

            clearInterval(timer);

            questionno++;

            nextQuestion();

        }
    </script>

</body>

</html>
